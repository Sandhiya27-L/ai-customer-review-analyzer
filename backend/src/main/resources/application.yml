server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: review-analyzer
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/review_analyzer?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  jwt:
    secret: ${JWT_SECRET:default-dev-secret-change-in-production-min-32-chars!!}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
    remember-me-expiration-ms: ${JWT_REMEMBER_ME_EXPIRATION_MS:604800000}
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.5-flash}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

logging:
  level:
    com.reviewanalyzer: INFO
    org.springframework.security: WARN
